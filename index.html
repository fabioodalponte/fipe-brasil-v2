<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>FIPE Brasil — Inteligencia de mercado automotivo</title>
    <meta
      name="description"
      content="Consulte precos FIPE, historico de valorizacao, rankings e tendencias do mercado automotivo brasileiro."
    />

    <!--
      Defaults de Open Graph / Twitter Card. Funcionam como fallback para crawlers
      que nao executam JS; em paginas prerenderizadas, useSEO sobrescreve estes
      valores com os metadados especificos da rota.
      TODO: adicionar /og-default.png (>=1200x630) em public/ e referenciar em
      og:image / twitter:image para cards sociais com imagem.
    -->
    <meta property="og:site_name" content="FIPE Brasil" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fipebrasil.com/" />
    <meta
      property="og:title"
      content="FIPE Brasil — Inteligencia de mercado automotivo"
    />
    <meta
      property="og:description"
      content="Consulte precos FIPE, historico de valorizacao, rankings e tendencias do mercado automotivo brasileiro."
    />
    <meta name="twitter:card" content="summary" />
    <meta
      name="twitter:title"
      content="FIPE Brasil — Inteligencia de mercado automotivo"
    />
    <meta
      name="twitter:description"
      content="Consulte precos FIPE, historico de valorizacao, rankings e tendencias do mercado automotivo brasileiro."
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
